name: Build AmneziaWG OpenWrt packages

on:
  workflow_dispatch:
    inputs:
      openwrt_release:
        description: OpenWrt release
        default: "25.12.2"
        required: true
      target:
        description: OpenWrt target
        default: "mediatek"
        required: true
      subtarget:
        description: OpenWrt subtarget
        default: "filogic"
        required: true
      pkgarch:
        description: OpenWrt package architecture
        default: "aarch64_cortex-a53"
        required: true
      sdk_variant:
        description: OpenWrt SDK variant
        default: "gcc-14.3.0_musl"
        required: true
  push:
    tags:
      - "*.*.*-*"

permissions:
  contents: write

env:
  AWG_KERNEL_TAG: v1.0.20260329-2
  AWG_KERNEL_HASH: db833b4bd2a464a43248f4603186b3d0d58c781ba49989a5b515451dcd3d8833
  AWG_TOOLS_TAG: v1.0.20260223
  AWG_TOOLS_HASH: ab09cfafe6c1e9a6260964a8ba5cb2d657cc23862eb0c29253305e532ac40a16

jobs:
  resolve:
    name: resolve build tuple
    runs-on: ubuntu-latest
    outputs:
      openwrt_release: ${{ steps.resolve.outputs.openwrt_release }}
      target: ${{ steps.resolve.outputs.target }}
      subtarget: ${{ steps.resolve.outputs.subtarget }}
      pkgarch: ${{ steps.resolve.outputs.pkgarch }}
      sdk_variant: ${{ steps.resolve.outputs.sdk_variant }}
      release_id: ${{ steps.resolve.outputs.release_id }}
      build_id: ${{ steps.resolve.outputs.build_id }}
    steps:
      - id: resolve
        name: Resolve build tuple
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            openwrt_release="${{ inputs.openwrt_release || '25.12.2' }}"
            target="${{ inputs.target || 'mediatek' }}"
            subtarget="${{ inputs.subtarget || 'filogic' }}"
            pkgarch="${{ inputs.pkgarch || 'aarch64_cortex-a53' }}"
            sdk_variant="${{ inputs.sdk_variant || 'gcc-14.3.0_musl' }}"
            release_id="${openwrt_release}-${target}-${subtarget}-${pkgarch}"
          else
            tag="${GITHUB_REF_NAME}"
            IFS='-' read -r openwrt_release target subtarget pkgarch <<< "${tag}"
            case "${openwrt_release}" in
              24.10.*) sdk_variant="gcc-13.3.0_musl" ;;
              25.12.*) sdk_variant="gcc-14.3.0_musl" ;;
              *)
                echo "Unsupported OpenWrt release in tag: ${openwrt_release}" >&2
                exit 1
                ;;
            esac
            release_id="${tag}"
          fi

          build_id="${openwrt_release}_${target}_${subtarget}_${pkgarch}"
          {
            echo "openwrt_release=${openwrt_release}"
            echo "target=${target}"
            echo "subtarget=${subtarget}"
            echo "pkgarch=${pkgarch}"
            echo "sdk_variant=${sdk_variant}"
            echo "release_id=${release_id}"
            echo "build_id=${build_id}"
          } >> "${GITHUB_OUTPUT}"

  build-kmod:
    name: kmod-amneziawg
    runs-on: ubuntu-latest
    needs: resolve
    env:
      OPENWRT_RELEASE: ${{ needs.resolve.outputs.openwrt_release }}
      OPENWRT_TARGET: ${{ needs.resolve.outputs.target }}
      OPENWRT_SUBTARGET: ${{ needs.resolve.outputs.subtarget }}
      OPENWRT_PKGARCH: ${{ needs.resolve.outputs.pkgarch }}
      OPENWRT_SDK_VARIANT: ${{ needs.resolve.outputs.sdk_variant }}
      RELEASE_ID: ${{ needs.resolve.outputs.release_id }}
      BUILD_ID: ${{ needs.resolve.outputs.build_id }}
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Download OpenWrt SDK
        run: |
          set -euo pipefail
          sdk_name="openwrt-sdk-${OPENWRT_RELEASE}-${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}_${OPENWRT_SDK_VARIANT}.Linux-x86_64.tar.zst"
          sdk_url="https://downloads.openwrt.org/releases/${OPENWRT_RELEASE}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}/${sdk_name}"
          mkdir -p sdk
          curl -L --fail --retry 3 --output sdk/sdk.tar.zst "${sdk_url}"
          tar -I zstd -xf sdk/sdk.tar.zst -C sdk
          sdk_dir="$(find "$PWD/sdk" -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          test -n "${sdk_dir}"
          printf '%s\n' "${sdk_dir}" > sdk/.dir

      - name: Build kmod package
        working-directory: sdk
        run: |
          set -euo pipefail
          sdk_dir="$(cat .dir)"
          dist_root="dist/${OPENWRT_RELEASE}/${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}-${OPENWRT_PKGARCH}"
          mkdir -p "${sdk_dir}/package/awgopenwrt"
          cp -a ../builder/packages/kmod-amneziawg "${sdk_dir}/package/awgopenwrt/"
          cd "${sdk_dir}"
          {
            echo "CONFIG_PACKAGE_kmod-amneziawg=m"
            echo "CONFIG_PACKAGE_kmod-crypto-lib-chacha20=m"
            echo "CONFIG_PACKAGE_kmod-crypto-lib-chacha20poly1305=m"
            echo "CONFIG_PACKAGE_kmod-crypto-chacha20poly1305=m"
            echo "CONFIG_PACKAGE_kmod-crypto-lib-curve25519=m"
            echo "CONFIG_PACKAGE_kmod-udptunnel4=m"
            echo "CONFIG_PACKAGE_kmod-udptunnel6=m"
          } >> .config
          make defconfig
          make package/awgopenwrt/kmod-amneziawg/clean
          make package/awgopenwrt/kmod-amneziawg/compile -j"$(nproc)" V=s
          mkdir -p "../${dist_root}"
          find bin -type f \( -name 'kmod-amneziawg-*.apk' -o -name 'kmod-amneziawg_*.apk' \) -exec cp {} "../${dist_root}/" \;

      - name: Upload kmod artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.BUILD_ID }}-kmod-amneziawg
          path: dist/${{ env.OPENWRT_RELEASE }}/${{ env.OPENWRT_TARGET }}-${{ env.OPENWRT_SUBTARGET }}-${{ env.OPENWRT_PKGARCH }}/*.apk

  build-luci:
    name: luci-proto-amneziawg
    runs-on: ubuntu-latest
    needs: resolve
    env:
      OPENWRT_RELEASE: ${{ needs.resolve.outputs.openwrt_release }}
      OPENWRT_TARGET: ${{ needs.resolve.outputs.target }}
      OPENWRT_SUBTARGET: ${{ needs.resolve.outputs.subtarget }}
      OPENWRT_PKGARCH: ${{ needs.resolve.outputs.pkgarch }}
      OPENWRT_SDK_VARIANT: ${{ needs.resolve.outputs.sdk_variant }}
      RELEASE_ID: ${{ needs.resolve.outputs.release_id }}
      BUILD_ID: ${{ needs.resolve.outputs.build_id }}
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Download OpenWrt SDK
        run: |
          set -euo pipefail
          sdk_name="openwrt-sdk-${OPENWRT_RELEASE}-${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}_${OPENWRT_SDK_VARIANT}.Linux-x86_64.tar.zst"
          sdk_url="https://downloads.openwrt.org/releases/${OPENWRT_RELEASE}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}/${sdk_name}"
          mkdir -p sdk
          curl -L --fail --retry 3 --output sdk/sdk.tar.zst "${sdk_url}"
          tar -I zstd -xf sdk/sdk.tar.zst -C sdk
          sdk_dir="$(find "$PWD/sdk" -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          test -n "${sdk_dir}"
          printf '%s\n' "${sdk_dir}" > sdk/.dir

      - name: Build LuCI protocol package
        working-directory: sdk
        run: |
          set -euo pipefail
          sdk_dir="$(cat .dir)"
          dist_root="dist/${OPENWRT_RELEASE}/${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}-${OPENWRT_PKGARCH}"
          mkdir -p "${sdk_dir}/package/awgopenwrt"
          cp -a ../builder/packages/luci-proto-amneziawg "${sdk_dir}/package/awgopenwrt/"
          cd "${sdk_dir}"
          {
            echo "CONFIG_PACKAGE_luci-proto-amneziawg=m"
          } >> .config
          make defconfig
          make package/awgopenwrt/luci-proto-amneziawg/clean
          make package/awgopenwrt/luci-proto-amneziawg/compile -j"$(nproc)" V=s
          mkdir -p "../${dist_root}"
          find bin -type f \( -name 'luci-proto-amneziawg-*.apk' -o -name 'luci-proto-amneziawg_*.apk' \) -exec cp {} "../${dist_root}/" \;

      - name: Upload LuCI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.BUILD_ID }}-luci-proto-amneziawg
          path: dist/${{ env.OPENWRT_RELEASE }}/${{ env.OPENWRT_TARGET }}-${{ env.OPENWRT_SUBTARGET }}-${{ env.OPENWRT_PKGARCH }}/*.apk

  build-tools:
    name: amneziawg-tools
    runs-on: ubuntu-latest
    needs: resolve
    env:
      OPENWRT_RELEASE: ${{ needs.resolve.outputs.openwrt_release }}
      OPENWRT_TARGET: ${{ needs.resolve.outputs.target }}
      OPENWRT_SUBTARGET: ${{ needs.resolve.outputs.subtarget }}
      OPENWRT_PKGARCH: ${{ needs.resolve.outputs.pkgarch }}
      OPENWRT_SDK_VARIANT: ${{ needs.resolve.outputs.sdk_variant }}
      RELEASE_ID: ${{ needs.resolve.outputs.release_id }}
      BUILD_ID: ${{ needs.resolve.outputs.build_id }}
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Download OpenWrt SDK
        run: |
          set -euo pipefail
          sdk_name="openwrt-sdk-${OPENWRT_RELEASE}-${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}_${OPENWRT_SDK_VARIANT}.Linux-x86_64.tar.zst"
          sdk_url="https://downloads.openwrt.org/releases/${OPENWRT_RELEASE}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}/${sdk_name}"
          mkdir -p sdk
          curl -L --fail --retry 3 --output sdk/sdk.tar.zst "${sdk_url}"
          tar -I zstd -xf sdk/sdk.tar.zst -C sdk
          sdk_dir="$(find "$PWD/sdk" -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          test -n "${sdk_dir}"
          printf '%s\n' "${sdk_dir}" > sdk/.dir

      - name: Build userspace package
        working-directory: sdk
        run: |
          set -euo pipefail
          sdk_dir="$(cat .dir)"
          dist_root="dist/${OPENWRT_RELEASE}/${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}-${OPENWRT_PKGARCH}"
          mkdir -p "${sdk_dir}/package/awgopenwrt"
          cp -a ../builder/packages/amneziawg-tools "${sdk_dir}/package/awgopenwrt/"
          cd "${sdk_dir}"
          make defconfig
          make package/awgopenwrt/amneziawg-tools/clean
          make package/awgopenwrt/amneziawg-tools/compile -j"$(nproc)" V=s
          mkdir -p "../${dist_root}"
          find bin -type f \( -name 'amneziawg-tools-*.apk' -o -name 'amneziawg-tools_*.apk' \) -exec cp {} "../${dist_root}/" \;

      - name: Upload userspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.BUILD_ID }}-amneziawg-tools
          path: dist/${{ env.OPENWRT_RELEASE }}/${{ env.OPENWRT_TARGET }}-${{ env.OPENWRT_SUBTARGET }}-${{ env.OPENWRT_PKGARCH }}/*.apk

  release:
    name: Publish release
    needs:
      - resolve
      - build-kmod
      - build-luci
      - build-tools
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      OPENWRT_RELEASE: ${{ needs.resolve.outputs.openwrt_release }}
      OPENWRT_TARGET: ${{ needs.resolve.outputs.target }}
      OPENWRT_SUBTARGET: ${{ needs.resolve.outputs.subtarget }}
      OPENWRT_PKGARCH: ${{ needs.resolve.outputs.pkgarch }}
      OPENWRT_SDK_VARIANT: ${{ needs.resolve.outputs.sdk_variant }}
      RELEASE_ID: ${{ needs.resolve.outputs.release_id }}
      BUILD_ID: ${{ needs.resolve.outputs.build_id }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Rename packages
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for pkg in \
            amneziawg-tools \
            kmod-amneziawg \
            luci-proto-amneziawg
          do
            src="$(find release -type f \( -name "${pkg}*.apk" -o -name "${pkg}_*.apk" \) | head -n1)"
            test -n "${src}"
            cp "${src}" "release-assets/openwrt-${BUILD_ID}-${pkg}.apk"
          done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_ID }}
          files: release-assets/*.apk
